abstract: Paper propose general framework, layer-wise relevance propagation (LRP), for pixel-wise decomposition
  of nonlinear classifier decisions in image classification. Method assign relevance score each pixel
  by backward pass through classifier layers, conserving total relevance layer to layer, applicable both
  Bag-of-Words kernel classifiers and multilayer neural networks. Alternative Taylor-type decomposition
  also introduced as related approximation. Evaluated on PASCAL VOC, synthetic polygon/circle images,
  MNIST digits, and pretrained ImageNet Caffe network, producing heatmaps highlighting pixels driving
  classification decisions, validated qualitatively and via pixel-flipping experiments.
